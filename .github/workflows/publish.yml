name: Publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: true
        default: '0.0.0'
        type: string
      release-notes:
        description: 'Release notes'
        required: true
        default: 'No release notes'
        type: string
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
  pull_request:
    types: [closed]
    branches:
      - "**"
    paths:
      - "Source/Screenplay/**"
      - "Source/DotNET/**"
      - "*.props"
      - "*.targets"

env:
  NUGET_OUTPUT: ./Artifacts/NuGet
  DOTNET_VERSION: "10.0.x"

permissions:
  contents: write
  deployments: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      publish: ${{ steps.release.outputs.should-publish }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Release
        id: release
        uses: cratis/release-action@v1
        with:
          version: ${{ github.event.inputs.version }}
          release-notes: ${{ github.event.inputs.release-notes }}

  publish:
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 23.x

      - uses: actions/cache@v3
        id: yarn-cache
        with:
          path: |
            .yarn/cache
            **/node_modules
            **/.eslintcache
            **/yarn.lock
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/package.json') }}

      - name: Yarn install
        run: yarn

      - name: Build language service
        run: yarn workspace @cratis/screenplay-language build

      - name: Build extension
        working-directory: ./Source/Screenplay/VSCodeExtension
        run: yarn vscode:prepublish

      - name: Set extension version
        working-directory: ./Source/Screenplay/VSCodeExtension
        # vsce's own version bump shells out to npm version, which cannot handle the
        # workspace:* dependency protocol - write the version directly instead.
        run: npm pkg set version=${{ needs.release.outputs.version }}

      - name: Publish to VSCode Marketplace
        working-directory: ./Source/Screenplay/VSCodeExtension
        env:
          # npm resolves the workspace's peer dependencies strictly when npx installs vsce;
          # eslint-plugin-react does not yet accept eslint 10, so relax to yarn's behavior.
          npm_config_legacy_peer_deps: "true"
        run: npx @vscode/vsce publish --no-dependencies --pat ${{ secrets.VSCE_PAT }}

  publish-dotnet-packages:
    if: needs.release.outputs.publish == 'true'
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      # Required for NuGet trusted publishing using OIDC tokens
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Remove any existing artifacts
        run: rm -rf ${{ env.NUGET_OUTPUT }}

      - name: Build
        run: dotnet build --configuration Release -p:Version=${{ needs.release.outputs.version }}

      - name: Create NuGet packages
        run: dotnet pack --no-build --configuration Release -o ${{ env.NUGET_OUTPUT }} -p:PackageVersion=${{ needs.release.outputs.version }}

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push NuGet packages
        run: dotnet nuget push --skip-duplicate '${{ env.NUGET_OUTPUT }}/*.nupkg' --timeout 900 --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
